<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDS Doctor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9878;</text></svg>">
    <link rel="stylesheet" href="https://fast.decentespresso.com/css/skel.css" />
    <link rel="stylesheet" href="https://fast.decentespresso.com/css/style.css" />
    <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
    <!-- Connection bar -->
    <header id="connection-bar">
        <div id="status-indicator" class="status-dot disconnected" role="status" aria-label="Disconnected"></div>
        <span id="status-text">No device connected</span>
        <div id="connect-split" class="connect-split">
            <button id="connect-btn" class="button special small connect-main" type="button">Connect</button>
            <button id="connect-caret" class="button special small connect-caret hidden" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="Choose connection method">&#9662;</button>
            <ul id="connect-menu" class="connect-menu hidden" role="menu" aria-labelledby="connect-caret">
                <li class="connect-menu-item" role="menuitem" data-method="usb" tabindex="0">Connect via USB</li>
                <li class="connect-menu-item" role="menuitem" data-method="ble" tabindex="0">Connect via BLE</li>
            </ul>
        </div>
    </header>

    <!-- Content area -->
    <main id="app" class="page-container">
        <!-- Views injected by ui.ts -->
    </main>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
